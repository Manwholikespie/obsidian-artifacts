name: Release

# Fires when you push a version tag (e.g. `0.1.0`). Obsidian's convention
# is bare version numbers — no leading `v`. The workflow installs with
# bun, runs the build, and creates a *draft* GitHub release with the
# three required assets attached. Review the draft and click "Publish
# release" in the UI to make it public — this gives you a chance to
# write release notes and catches mistakes before they go out.

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "$tag" \
            --draft \
            --generate-notes \
            main.js manifest.json styles.css
